<script>
var processed = [];
var chartObj = null;
var currentRange = "all";

function calculateAnnualized(navVal, days) {
  return days > 0 ? (navVal - 1) * 100 / days * 365 : 0;
}

function formatPercent(value) {
  var num = Number(value);
  if (!isFinite(num)) return "0.00%";
  return num.toFixed(2) + "%";
}

/* 回车触发搜索 */
document.getElementById("prodInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") searchProduct();
});

function randomRnd() {
  return Math.floor(1000 + Math.random() * 99999000);
}

/* 搜索主函数 - 优先调用本地刷新脚本，失败后fallback到直连/代理 */
function searchProduct() {
  var code = document.getElementById("prodInput").value.trim().toUpperCase();
  if (!code) { alert("请输入产品代码"); return; }
  document.getElementById("loadingMask").classList.add("show");
  document.getElementById("searchBtn").disabled = true;
  document.getElementById("subtitle").textContent = "正在调用本地脚本刷新数据...";

  tryRefreshScript(code).catch(function(e) {
    console.warn("本地脚本刷新失败:", e.message, "尝试直连/代理查询...");
    document.getElementById("subtitle").textContent = "本地脚本不可用，尝试中银API直连...";
    return tryFetch(code, false).catch(function(e2) {
      console.warn("直连失败:", e2.message, "尝试本地代理...");
      document.getElementById("subtitle").textContent = "直连失败，尝试本地代理 (localhost:8082)...";
      return tryFetch(code, true);
    });
  }).then(function(data) {
    if (!data || data.length === 0) throw new Error("未获取到数据，请检查产品代码");
    var pdata = processRawData(data);
    renderAll(code, pdata);
  }).catch(function(e2) {
    console.error("所有请求方式均失败:", e2);
    alert("请求失败：" + e2.message + "\n\n请先运行 boc_proxy.py 启动本地代理，或检查产品代码是否正确。");
  }).finally(function() {
    document.getElementById("loadingMask").classList.remove("show");
    document.getElementById("searchBtn").disabled = false;
  });
}

function tryRefreshScript(prodCode) {
  return fetch("http://127.0.0.1:8082/refresh?code=" + encodeURIComponent(prodCode))
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success) return result.data || [];
      throw new Error(result.error || "本地脚本刷新失败");
    });
}

/* 统一请求入口：isProxy=true 时走本地代理 */
function tryFetch(prodCode, isProxy) {
  if (isProxy) {
    // 依次尝试 8082、8080、8081
    return fetch("http://127.0.0.1:8082/nav?code=" + encodeURIComponent(prodCode))
      .then(function(r) { return r.json(); })
      .then(function(result) {
        if (result.success) return result.data || [];
        throw new Error(result.error || "代理返回错误");
      }).catch(function(e) {
        return fetch("http://127.0.0.1:8080/nav?code=" + encodeURIComponent(prodCode))
          .then(function(r) { return r.json(); })
          .then(function(result) {
            if (result.success) return result.data || [];
            throw new Error(result.error || "代理返回错误");
          });
      }).catch(function(e2) {
        return fetch("http://127.0.0.1:8081/nav?code=" + encodeURIComponent(prodCode))
          .then(function(r) { return r.json(); })
          .then(function(result) {
            if (result.success) return result.data || [];
            throw new Error(result.error || "代理返回错误");
          });
      });
  }
  return fetchNavData(prodCode);
}

/* 请求中银API接口 */
function fetchNavData(prodCode) {
  var payload = {
    header: {
      agent: "X-ANDR", version: "3.1.9", device: "android", platform: "android",
      plugins: "5", page: "6", local: "zh_CN",
      uuid: "177842367864015718698", ext: "8", cipherType: "0", appSequence: ""
    },
    method: "PsnxWmpHistoryNavQueryOutlay",
    params: { productId: prodCode, subChannelId: "31", circle: "3Y" }
  };
  var body = "json=" + encodeURIComponent(JSON.stringify(payload));
  return fetch("https://ebsnew.boc.cn/BMPS/_bfwajax.do?rnd=" + randomRnd() + "&_locale=zh_CN", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
      "Accept": "application/json",
      "Accept-Encoding": "gzip, deflate",
      "bfw-ctrl": "json",
      "Origin": "https://ebsnew.boc.cn",
      "X-Requested-With": "com.android.browser",
      "Referer": "https://ebsnew.boc.cn/preview/bocphone/VueLocalCli4/bocFinanceDetail/index.html",
      "Accept-Language": "zh-CN,zh;q=0.9,en-US;q=0.8,en;q=0.7"
    },
    body: body,
    mode: "cors"
  }).then(function(resp) {
    return resp.text();
  }).then(function(text) {
    console.log("API原始返回:", text.substring(0, 1000));
    var data = parseResponse(text);
    if (data && data.length > 0) return data;
    throw new Error("返回数据为空，请检查产品代码或Cookie是否过期");
  }).catch(function(e) {
    console.error("API请求失败:", e);
    throw e;
  });
}


/* 处理原始数据 */
function processRawData(rawList) {
  if (!rawList || rawList.length === 0) return [];
  var sorted = rawList.slice().sort(function(a, b) {
    var da = (a.updateDate || a.update_date || "").replace(/\//g, "-");
    var db = (b.updateDate || b.update_date || "").replace(/\//g, "-");
    return da.localeCompare(db);
  });
  var startStr = (sorted[0].updateDate || sorted[0].update_date || "").replace(/\//g, "-");
  var startDate = new Date(startStr);
  return sorted.map(function(item, idx) {
    var dateStr = (item.updateDate || item.update_date || "").replace(/\//g, "-");
    var navVal = parseFloat(item.nav || item.NAV || item.netValue || 0);
    var dObj = new Date(dateStr);
    var days = Math.round((dObj - startDate) / 86400000) + 1;
    var annualized = calculateAnnualized(navVal, days);
    var prevItem = idx > 0 ? sorted[idx - 1] : item;
    var prevNav = parseFloat(prevItem.nav || prevItem.NAV || prevItem.netValue || navVal);
    var wan = (navVal - prevNav) * 10000;
    return { date: dateStr, nav: navVal, days: days, annualized: annualized, wan: wan };
  });
}

/* 渲染全部 */
function renderAll(prodCode, data) {
  processed = data;
  var startD = data[0].date;
  var endD = data[data.length - 1].date;
  var latest = data[data.length - 1];
  var maxAnn = Math.max.apply(null, data.map(function(x) { return x.annualized; }));
  document.getElementById("pageTitle").textContent = prodCode + " - 成立年化收益率走势";
  document.getElementById("subtitle").innerHTML = "成立年化收益率 / 历史净值走势 | 成立日：" + startD + " | 数据截至：" + endD;
  document.getElementById("prodMeta").innerHTML = "产品代码：<b>" + prodCode + "</b>";
  document.getElementById("totalCount").textContent = data.length;
  renderStats(latest, maxAnn);
  renderChart();
  renderTable(data);
}

function renderStats(latest, maxAnn) {
  var cards = [
    { label: "最新净值", value: latest.nav.toFixed(6), cls: "neu" },
    { label: "当前成立年化", value: formatPercent(latest.annualized), cls: latest.annualized >= 0 ? "pos" : "neg" },
    { label: "成立天数", value: latest.days + " 天", cls: "neu" },
    { label: "最高成立年化", value: formatPercent(maxAnn), cls: "pos" }
  ];
  var html = "";
  for (var i = 0; i < cards.length; i++) {
    html += '<div class="stat-card"><div class="label">' + cards[i].label + '</div><div class="value ' + cards[i].cls + '">' + cards[i].value + '</div></div>';
  }
  document.getElementById("statsRow").innerHTML = html;
}

/* 解析API响应 */
function parseResponse(text) {
  try {
    var json = JSON.parse(text);
    // 实际API返回格式: {"result": {"recordNumber":"208","list":[...]}}
    if (json && json.result && json.result.list && Array.isArray(json.result.list)) {
      return json.result.list;
    }
    if (json && json.result && Array.isArray(json.result)) {
      return json.result;
    }
    if (json && json.response && json.response.data && json.response.data.navList) {
      return json.response.data.navList;
    } else if (json && json.response && json.response.data) {
      return json.response.data;
    } else if (json && json.data) {
      return json.data;
    } else if (Array.isArray(json)) {
      return json;
    } else {
      console.error("无法解析响应数据:", json);
      return [];
    }
  } catch(e) {
    console.error("解析响应失败:", e, "原始文本前500字:", text.substring(0, 500));
    return [];
  }
}

function updateHoverInfo(item) {
  var box = document.getElementById("hoverInfo");
  if (!box) return;
  if (!item) {
    box.classList.add("empty");
    box.innerHTML = "";
    return;
  }
  var wanStr = (item.wan >= 0 ? "+" : "") + item.wan.toFixed(2);
  box.classList.remove("empty");
  box.innerHTML =
    '<span class="date">' + item.date + '（第 ' + item.days + ' 天）</span>' +
    '<span class="ann">成立年化 ' + formatPercent(item.annualized) + '</span>' +
    '<span class="nav">单位净值 ' + item.nav.toFixed(6) + '</span>' +
    '<span class="wan">当日万收 ' + wanStr + ' 元</span>';
}

/* 图表 */
function renderChart() {
  var ctx = document.getElementById("navChart").getContext("2d");
  if (chartObj) chartObj.destroy();
  var filtered = getFiltered(currentRange);
  if (filtered.length === 0) return;
  updateHoverInfo(null);
  var gradAnn = ctx.createLinearGradient(0, 0, 0, 320);
  gradAnn.addColorStop(0, "rgba(240,76,68,0.22)");
  gradAnn.addColorStop(1, "rgba(240,76,68,0.01)");
  var gradNav = ctx.createLinearGradient(0, 0, 0, 320);
  gradNav.addColorStop(0, "rgba(91,138,240,0.18)");
  gradNav.addColorStop(1, "rgba(91,138,240,0.01)");
  chartObj = new Chart(ctx, {
    type: "line",
    data: {
      labels: filtered.map(function(x) { return x.date; }),
      datasets: [
        {
          label: "成立年化(%)",
          data: filtered.map(function(x) { return x.annualized; }),
          borderColor: "#f04c44",
          backgroundColor: gradAnn,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: "#f04c44",
          pointHoverBorderColor: "#fff",
          pointHoverBorderWidth: 2,
          tension: 0.3,
          fill: true,
          yAxisID: "y"
        },
        {
          label: "单位净值",
          data: filtered.map(function(x) { return x.nav; }),
          borderColor: "#5b8af0",
          backgroundColor: gradNav,
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: "#5b8af0",
          pointHoverBorderColor: "#fff",
          pointHoverBorderWidth: 2,
          tension: 0.3,
          fill: true,
          yAxisID: "y2"
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          external: function(context) {
            var tooltip = context.tooltip;
            if (!tooltip || tooltip.opacity === 0 || !tooltip.dataPoints || tooltip.dataPoints.length === 0) {
              updateHoverInfo(null);
              return;
            }
            updateHoverInfo(filtered[tooltip.dataPoints[0].dataIndex]);
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#5a6480", maxTicksLimit: 10, maxRotation: 0 },
          grid: { color: "#1e2240" }
        },
        y: {
          position: "left",
          title: { display: true, text: "成立年化(%)", color: "#f04c44" },
          ticks: { color: "#f04c44", callback: function(v) { return formatPercent(v); } },
          grid: { color: "#1e2240" }
        },
        y2: {
          position: "right",
          title: { display: true, text: "净值", color: "#5b8af0" },
          ticks: { color: "#5b8af0", callback: function(v) { return v.toFixed(4); } },
          grid: { display: false }
        }
      }
    }
  });
}

/* 时间范围过滤 */
function getFiltered(range) {
  if (!processed.length) return [];
  var lastStr = processed[processed.length - 1].date;
  var lastDt = new Date(lastStr);
  var cutoff;
  if (range === "1m") { cutoff = new Date(lastDt); cutoff.setMonth(cutoff.getMonth() - 1); }
  else if (range === "3m") { cutoff = new Date(lastDt); cutoff.setMonth(cutoff.getMonth() - 3); }
  else if (range === "6m") { cutoff = new Date(lastDt); cutoff.setMonth(cutoff.getMonth() - 6); }
  else if (range === "1y") { cutoff = new Date(lastDt); cutoff.setFullYear(cutoff.getFullYear() - 1); }
  else { return processed; }
  return processed.filter(function(x) { return new Date(x.date) >= cutoff; });
}

/* 范围按钮 */
document.querySelectorAll(".range-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".range-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    currentRange = btn.getAttribute("data-range");
    renderChart();
  });
});

function toggleTableExpanded() {
  var section = document.getElementById("tableSection");
  var button = document.getElementById("tableToggleBtn");
  var expanded = section.classList.toggle("expanded");
  button.textContent = expanded ? "还原" : "放大";
}

/* 载入 Python 脚本预先嵌入的数据 */
function loadEmbeddedData() {
  var node = document.getElementById("embeddedNavData");
  if (!node || !node.textContent.trim()) return;
  try {
    var embedded = JSON.parse(node.textContent);
    var data = embedded && Array.isArray(embedded.data) ? embedded.data : [];
    var productId = embedded && embedded.productId ? embedded.productId : "";
    if (!productId || data.length === 0) return;
    document.getElementById("prodInput").value = productId;
    renderAll(productId, processRawData(data));
  } catch (e) {
    console.error("读取嵌入数据失败:", e);
  }
}

/* 表格 */
function renderTable(data) {
  var tbody = document.getElementById("tableBody");
  var rows = [];
  for (var i = data.length - 1; i >= 0; i--) {
    var d = data[i];
    var annCls = d.annualized >= 0 ? "td-pos" : "td-neg";
    var wanCls = d.wan >= 0 ? "td-pos" : "td-neg";
    var wanStr = (d.wan >= 0 ? "+" : "") + d.wan.toFixed(2);
    rows.push("<tr>" +
      "<td>" + d.date + "</td>" +
      "<td>" + d.nav.toFixed(6) + "</td>" +
      '<td class="' + wanCls + '">' + wanStr + "</td>" +
      '<td class="' + annCls + '">' + formatPercent(d.annualized) + "</td>" +
      "<td>" + d.days + "</td>" +
      "</tr>");
  }
  tbody.innerHTML = rows.join("");
}

loadEmbeddedData();
</script>
