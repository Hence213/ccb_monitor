<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品详情数据库</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #f6f7f9;
    color: #1f2933;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    font-size: 14px;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #fff;
    border-bottom: 1px solid #dde3ea;
  }
  h1 {
    margin: 0;
    font-size: 18px;
    white-space: nowrap;
  }
  .meta-group {
    flex: 1;
    min-width: 120px;
    display: flex;
    align-items: center;
    gap: 3px;
    overflow: hidden;
  }
  .meta {
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #6b7280;
    font-size: 12px;
    white-space: nowrap;
  }
  input {
    flex: 0 0 min(520px, 34vw);
    width: min(420px, 42vw);
    height: 34px;
    padding: 0 10px;
    border: 1px solid #cfd7e2;
    border-radius: 4px;
    outline: none;
  }
  input:focus { border-color: #b4002a; }
  button {
    flex: 0 0 auto;
    height: 34px;
    padding: 0 12px;
    border: 1px solid #cfd7e2;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
  }
  button:hover { border-color: #b4002a; color: #b4002a; }
  .path-toggle {
    width: 20px;
    height: 20px;
    padding: 0;
    border: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: #6b7280;
  }
  .path-toggle:hover {
    border-color: transparent;
    background: #fff7f8;
  }
  .path-toggle svg {
    width: 13px;
    height: 13px;
    stroke: currentColor;
  }
  .note-toggle.has-note {
    border-color: #b4002a;
    color: #b4002a;
    background: #fff7f8;
  }
  .note-popover {
    position: fixed;
    top: 58px;
    right: 16px;
    z-index: 20;
    width: min(360px, calc(100vw - 32px));
    background: #fff;
    border: 1px solid #cfd7e2;
    box-shadow: 0 18px 42px rgba(31, 41, 51, 0.2);
  }
  .note-popover[hidden] { display: none; }
  .note-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 9px 10px;
    border-bottom: 1px solid #e8edf3;
    color: #374151;
    font-size: 13px;
    font-weight: 700;
    cursor: move;
    user-select: none;
  }
  .note-close {
    width: 26px;
    height: 26px;
    padding: 0;
    line-height: 1;
    cursor: pointer;
  }
  .note-body {
    padding: 10px;
  }
  .note-text {
    display: block;
    width: 100%;
    min-height: 150px;
    resize: vertical;
    padding: 9px 10px;
    border: 1px solid #cfd7e2;
    border-radius: 4px;
    outline: none;
    color: #1f2933;
    font: inherit;
    line-height: 1.5;
  }
  .note-text:focus { border-color: #b4002a; }
  .note-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 9px;
  }
  .note-status {
    min-width: 0;
    color: #6b7280;
    font-size: 12px;
  }
  .view-toggle {
    font-size: 12px;
  }
  main { padding: 14px 16px 24px; }
  .table-wrap {
    max-height: calc(100vh - 98px);
    overflow: auto;
    background: #fff;
    border: 1px solid #dde3ea;
  }
  table {
    width: 100%;
    min-width: 1460px;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #e8edf3;
    border-right: 1px solid #eef2f6;
    text-align: left;
    vertical-align: top;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th {
    position: sticky;
    top: 0;
    z-index: 2;
    background: #f1f4f8;
    color: #4b5563;
    font-weight: 700;
  }
  .th-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }
  .th-inner > span,
  .sort-btn {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: left;
  }
  .sort-btn {
    height: 24px;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    font-weight: 700;
  }
  .sort-btn:hover { color: #b4002a; }
  .filter-btn {
    flex: 0 0 24px;
    width: 24px;
    height: 24px;
    padding: 0;
    color: #6b7280;
    line-height: 1;
  }
  .filter-btn.active {
    border-color: #b4002a;
    color: #b4002a;
    background: #fff7f8;
  }
  .filter-panel {
    position: fixed;
    z-index: 10;
    width: 260px;
    max-height: 380px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 1px solid #cfd7e2;
    box-shadow: 0 16px 40px rgba(31, 41, 51, 0.18);
  }
  .filter-panel[hidden] { display: none; }
  .filter-panel-head {
    padding: 10px;
    border-bottom: 1px solid #e8edf3;
  }
  .filter-panel-title {
    margin-bottom: 8px;
    color: #374151;
    font-weight: 700;
  }
  .filter-search {
    flex: 0 0 auto;
    width: 100%;
    height: 30px;
    padding: 0 8px;
    border: 1px solid #cfd7e2;
    border-radius: 4px;
    outline: none;
  }
  .filter-actions {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid #e8edf3;
  }
  .filter-actions button,
  .filter-panel-foot button {
    height: 28px;
    padding: 0 9px;
    font-size: 12px;
  }
  .filter-values {
    max-height: 220px;
    overflow: auto;
    padding: 6px 10px;
  }
  .filter-option {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 0;
    color: #1f2933;
    font-size: 12px;
  }
  .filter-option input {
    flex: 0 0 auto;
    width: 14px;
    height: 14px;
    margin: 0;
  }
  .filter-option span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .filter-panel-foot {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 9px 10px;
    border-top: 1px solid #e8edf3;
  }
  tbody tr:hover { background: #fff7f8; }
  th.row-index,
  td.row-index {
    width: 44px;
    min-width: 44px;
    text-align: center;
    color: #6b7280;
    font-variant-numeric: tabular-nums;
  }
  td.name {
    white-space: normal;
    line-height: 1.35;
  }
  .product-name-main {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    min-width: 0;
  }
  .product-title {
    flex: 1 1 auto;
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .product-id-sub,
  .cell-sub {
    display: block;
    margin-top: 3px;
    color: #8a94a3;
    font-size: 11px;
    line-height: 1.2;
  }
  .establish-days-main {
    display: block;
    text-align: center;
  }
  .risk-pill {
    flex: 0 0 auto;
    min-width: 24px;
    max-width: 54px;
    padding: 1px 7px;
    border: 1px solid #d6dde6;
    border-radius: 999px;
    color: #5b6573;
    background: #f8fafc;
    font-size: 11px;
    line-height: 1.45;
    text-align: center;
    white-space: nowrap;
  }
  td.num { text-align: left; font-variant-numeric: tabular-nums; }
  .amount-pair {
    display: inline-flex;
    align-items: baseline;
    gap: 5px;
    font-variant-numeric: tabular-nums;
  }
  .amount-sep { color: #a8b0bb; }
  td.nav-dif {
    text-align: center;
    line-height: 1.18;
  }
  th.nav-dif .th-inner { justify-content: center; }
  .detail-table th,
  .detail-table td {
    height: 45px;
  }
  .detail-table .fixed-col {
    position: sticky;
    z-index: 2;
    background: #fff;
  }
  .detail-table th.fixed-col {
    z-index: 4;
    background: #f1f4f8;
  }
  .detail-table tbody tr:hover .fixed-col { background: #fff7f8; }
  .nav-dif-value {
    display: block;
    font-size: 18px;
    font-weight: 800;
  }
  .nav-dif-date {
    display: block;
    margin-top: 3px;
    color: #6b7280;
    font-size: 11px;
    font-weight: 500;
  }
  .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .nav-red { color: #b4002a; font-weight: 700; }
  .nav-green { color: #087f5b; font-weight: 700; }
  .nav-gray { color: #7b8794; font-weight: 700; }
  .list-cell {
    min-width: 150px;
    max-width: 220px;
    white-space: normal;
  }
  .nav-diff-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
    color: #4b5563;
    font-size: 12px;
  }
  .nav-diff-stats,
  .nav-diff-pager {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .nav-diff-sort-btn {
    flex: 1 1 auto;
    min-width: 0;
    height: 24px;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    font-weight: 700;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-diff-sort-btn:hover { color: #b4002a; }
  .nav-diff-inline-head {
    text-align: center;
    color: #4b5563;
    font-size: 12px;
  }
  .nav-diff-stat,
  .nav-diff-page-btn {
    height: 26px;
    padding: 0 8px;
    font-size: 12px;
  }
  .nav-diff-stat.active {
    border-color: #b4002a;
    color: #b4002a;
    background: #fff7f8;
  }
  .nav-diff-page-btn:disabled {
    color: #a8b0bb;
    cursor: not-allowed;
  }
  .nav-diff-detail {
    margin-bottom: 8px;
    background: #fff;
    border: 1px solid #dde3ea;
  }
  .nav-diff-detail-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
    color: #374151;
    font-size: 12px;
    font-weight: 700;
    border-bottom: 1px solid #e8edf3;
  }
  .nav-diff-detail-body {
    max-height: 260px;
    overflow: auto;
  }
  .nav-diff-detail-table {
    min-width: 980px;
    table-layout: fixed;
  }
  .nav-diff-detail-table th,
  .nav-diff-detail-table td {
    padding: 6px 8px;
    font-size: 12px;
  }
  td.nav-diff-cell {
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .nav-diff-hot-30 { background: #fff4e6; color: #ad5f00; font-weight: 700; }
  .nav-diff-hot-50 { background: #ffe3e3; color: #c92a2a; font-weight: 800; }
  .nav-diff-hot-100 { background: #b4002a; color: #fff; font-weight: 900; }
  .cell-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }
  .amount-low { color: #b4002a; font-weight: 700; }
  .amount-zero { color: #087f5b; font-weight: 700; }
  .empty {
    padding: 30px;
    color: #6b7280;
    text-align: center;
    background: #fff;
    border: 1px solid #dde3ea;
  }
  @media (max-width: 760px) {
    header { flex-wrap: wrap; }
    h1 { width: 100%; }
    .meta-group { flex-basis: 100%; }
    input { flex-basis: calc(100% - 70px); width: auto; }
    .note-popover { top: 106px; }
  }
</style>
</head>
<body>
  <header>
    <h1>产品详情数据库</h1>
    <span class="meta-group">
      <span class="meta" id="meta">读取中...</span>
      <button class="path-toggle" id="togglePath" type="button" title="显示路径" aria-label="显示路径" hidden></button>
    </span>
    <button class="note-toggle" id="noteToggle" type="button">笔记</button>
    <input id="search" type="search" placeholder="搜索产品代码、名称或任意字段">
    <button id="reload" type="button">刷新</button>
  </header>

  <div class="note-popover" id="notePopover" hidden>
    <div class="note-head" id="noteHead">
      <span>便笺</span>
      <button class="note-close" id="noteClose" type="button" aria-label="关闭笔记">×</button>
    </div>
    <div class="note-body">
      <textarea class="note-text" id="noteText" placeholder="输入笔记内容"></textarea>
      <div class="note-foot">
        <span class="note-status" id="noteStatus"></span>
        <button id="noteSave" type="button">保存</button>
      </div>
    </div>
  </div>

  <main id="app">
    <div class="empty">正在读取数据库...</div>
  </main>

<script>
  const state = {
    rows: [],
    filtered: [],
    columnFilters: {},
    activeFilterColumn: "",
    filterSearch: "",
    filterSearchCaret: 0,
    pendingFilterValues: null,
    sortKey: "nav_dif",
    sortDir: "desc",
    showDatabasePath: false,
    navDiffData: null,
    navDiffPage: 0,
    navDiffPageSize: 7,
    navDiffDetailThreshold: "",
    navDiffScrollTop: 0,
    navDiffValueSortDate: "",
    navDiffValueSortDir: "desc",
    productOrderIds: [],
    productOrderSource: "details",
  };

  const app = document.getElementById("app");
  const meta = document.getElementById("meta");
  const search = document.getElementById("search");
  const reload = document.getElementById("reload");
  const togglePath = document.getElementById("togglePath");
  const noteToggle = document.getElementById("noteToggle");
  const notePopover = document.getElementById("notePopover");
  const noteHead = document.getElementById("noteHead");
  const noteClose = document.getElementById("noteClose");
  const noteText = document.getElementById("noteText");
  const noteSave = document.getElementById("noteSave");
  const noteStatus = document.getElementById("noteStatus");
  const noteState = {
    content: "",
    left: null,
    top: null,
    dragging: false,
    dragOffsetX: 0,
    dragOffsetY: 0,
  };

  const columns = [
    { key: "productName", label: "productName", width: "260px", fixedLeft: 44 },
    {
      key: "nav_dif",
      label: "nav_dif",
      className: "nav-dif",
      width: "106px",
      fixedLeft: 304,
      display: (row) => safe(row.navDif),
      filterValue: (row) => safe(row.navDate),
      sortValue: (row) => numberOrNull(row.navDif),
    },
    { key: "periodTerm", label: "期限", numericFilter: true, sortValue: (row) => numberOrNull(row.periodTerm), width: "68px", fixedLeft: 410 },
    { key: "establishDays", label: "成立天数", sortValue: (row) => numberOrNull(row.establishDays), filterable: false, width: "72px", fixedLeft: 478 },
    { key: "annualizedYield", label: "成立年化", sortValue: (row) => numberOrNull(String(row.annualizedYield).replace("%", "")), filterable: false, width: "76px", fixedLeft: 550 },
    {
      key: "indiAmtRem",
      label: "indiAmtRem",
      width: "96px",
      fixedLeft: 626,
      display: (row) => compactAmount(row.indiAmtRem),
      filterValue: (row) => safe(row.indiAmtRemDate),
      sortValue: (row) => numberOrNull(row.indiAmtRem),
      filterable: false,
    },
    {
      key: "productSize",
      label: "productSize / indiAmt",
      width: "138px",
      fixedLeft: 722,
      display: (row) => compactAmount(row.productSize),
      filterValue: (row) => safe(row.productSizeDate),
      sortValue: (row) => numberOrNull(row.productSize),
      filterable: false,
    },
  ];

  function filterStateFor(key) {
    if (!state.columnFilters[key]) {
      state.columnFilters[key] = { selected: null, expr: "" };
    }
    return state.columnFilters[key];
  }

  function valuesForFilterPanel(key) {
    const selected = filterStateFor(key).selected;
    return selected === null ? new Set(uniqueValuesForColumn(key)) : new Set(selected);
  }

  function initialFilterPanelValues(key) {
    const selected = filterStateFor(key).selected;
    return selected === null ? new Set() : new Set(selected);
  }

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[char]));
  }

  function safe(value) {
    return value === null || value === undefined || value === "" ? "-" : String(value);
  }

  function compactAmount(value) {
    const parsed = Number(value);
    if (!Number.isFinite(parsed)) return "-";
    const tenThousand = parsed / 10000;
    const amount = tenThousand > 100 ? parsed / 100000000 : tenThousand;
    const unit = tenThousand > 100 ? "亿" : "万";
    return `${amount.toLocaleString("zh-CN", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    })}${unit}`;
  }

  function parseDate(value) {
    const text = safe(value).replaceAll("/", "-");
    const time = Date.parse(text);
    return Number.isFinite(time) ? time : 0;
  }

  function amountClassFromValue(value) {
    if (compactAmount(value) === "0.00万") return "amount-zero";
    const parsed = Number(value);
    return Number.isFinite(parsed) && parsed <= 100000000 ? "amount-low" : "";
  }

  function navDifClass(value) {
    const parsed = Number(value);
    if (!Number.isFinite(parsed)) return "";
    if (parsed > 3) return "nav-red";
    if (parsed < 0) return "nav-green";
    if (parsed >= 0.2 && parsed <= 0.4) return "nav-gray";
    return "";
  }

  function numberOrNull(value) {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : null;
  }

  function parseNumericExpr(expr) {
    const match = String(expr || "").trim().match(/^(>=|<=|>|<|=)\s*(-?\d+(?:\.\d+)?)$/);
    if (!match) return null;
    return { op: match[1], value: Number(match[2]) };
  }

  function matchesNumericExpr(rawValue, expr) {
    const parsed = parseNumericExpr(expr);
    if (!parsed) return true;
    const value = Number(rawValue);
    if (!Number.isFinite(value)) return false;
    if (parsed.op === ">") return value > parsed.value;
    if (parsed.op === "<") return value < parsed.value;
    if (parsed.op === ">=") return value >= parsed.value;
    if (parsed.op === "<=") return value <= parsed.value;
    return value === parsed.value;
  }

  async function load() {
    reload.disabled = true;
    reload.textContent = "读取中";
    app.innerHTML = '<div class="empty">正在读取数据库...</div>';
    try {
      const [detailResponse, navDiffResponse] = await Promise.all([
        fetch("/db-product-details"),
        fetch("/db-product-nav-diffs"),
      ]);
      const data = await detailResponse.json();
      if (!data.success) throw new Error(data.error || "读取失败");
      const navDiffData = await navDiffResponse.json();
      if (!navDiffData.success) throw new Error(navDiffData.error || "读取近一年净值变化失败");
      state.navDiffData = navDiffData;
      state.navDiffPage = 0;
      state.navDiffDetailThreshold = "";
      state.navDiffScrollTop = 0;
      if (navDiffData.database) meta.dataset.database = navDiffData.database;
      state.rows = (data.products || []).map((row) => ({
        ...row,
        text: JSON.stringify(row).toLowerCase(),
      }));
      applyFilter();
      updateMeta(data.database);
    } catch (error) {
      app.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
      meta.textContent = "读取失败";
    } finally {
      reload.disabled = false;
      reload.textContent = "刷新";
    }
  }

  function applyFilter() {
    const keyword = search.value.trim().toLowerCase();
    state.filtered = state.rows.filter((row) => {
      if (keyword && !row.text.includes(keyword)) return false;
      return columns.every((column) => {
        if (column.filterable === false) return true;
        const filterState = filterStateFor(column.key);
        if (column.numericFilter && filterState.expr && !matchesNumericExpr(filterValue(row, column.key), filterState.expr)) {
          return false;
        }
        const selected = filterState.selected;
        if (!selected) return true;
        return selected.has(filterValue(row, column.key));
      });
    });
    if (state.productOrderSource === "navDiffs" && state.productOrderIds.length) {
      applyProductOrder(state.filtered);
    } else {
      applySort();
      setProductOrder(state.filtered, "details");
    }
    render();
    updateMeta();
  }

  function filterValue(row, key) {
    const column = columns.find((item) => item.key === key);
    if (column?.filterValue) return column.filterValue(row);
    if (column?.display) return column.display(row);
    return safe(row[key]);
  }

  function sortValue(row, key) {
    const column = columns.find((item) => item.key === key);
    if (column?.sortValue) return column.sortValue(row);
    if (column?.display) return column.display(row);
    return row[key];
  }

  function applySort() {
    if (!state.sortKey) return;
    const direction = state.sortDir === "desc" ? -1 : 1;
    state.filtered.sort((left, right) => compareValues(sortValue(left, state.sortKey), sortValue(right, state.sortKey)) * direction);
  }

  function setProductOrder(rows, source) {
    state.productOrderIds = rows.map((row) => row.productId).filter(Boolean);
    state.productOrderSource = source;
  }

  function productOrderIndex() {
    return new Map(state.productOrderIds.map((productId, index) => [productId, index]));
  }

  function applyProductOrder(rows) {
    const order = productOrderIndex();
    rows.sort((left, right) => {
      const leftIndex = order.has(left.productId) ? order.get(left.productId) : Number.MAX_SAFE_INTEGER;
      const rightIndex = order.has(right.productId) ? order.get(right.productId) : Number.MAX_SAFE_INTEGER;
      if (leftIndex !== rightIndex) return leftIndex - rightIndex;
      return String(left.productName || "").localeCompare(String(right.productName || ""), "zh-CN");
    });
  }

  function compareValues(left, right) {
    if (left === null || left === undefined || left === "-") return 1;
    if (right === null || right === undefined || right === "-") return -1;
    const leftNumber = Number(left);
    const rightNumber = Number(right);
    if (Number.isFinite(leftNumber) && Number.isFinite(rightNumber)) return leftNumber - rightNumber;
    const leftDate = parseDate(left);
    const rightDate = parseDate(right);
    if (leftDate && rightDate) return leftDate - rightDate;
    return String(left).localeCompare(String(right), "zh-CN");
  }

  function updateMeta(database) {
    const dbText = database || meta.dataset.database || "";
    if (database) meta.dataset.database = database;
    const activeCount = columns.filter((column) => column.filterable !== false && isColumnFiltered(column.key)).length;
    const filterText = activeCount ? ` | 已筛选 ${activeCount} 列` : "";
    const pathText = state.showDatabasePath && dbText ? ` | ${dbText}` : "";
    const dateText = state.navDiffData
      ? ` | 当前 ${pagedNavDiffDates().length} / 全年 ${state.navDiffData.dates.length} 个日期`
      : "";
    meta.textContent = `显示 ${state.filtered.length} / ${state.rows.length} 条${dateText}${filterText}${pathText}`;
    togglePath.hidden = !dbText;
    togglePath.title = state.showDatabasePath ? "隐藏路径" : "显示路径";
    togglePath.setAttribute("aria-label", togglePath.title);
    togglePath.innerHTML = pathToggleIcon(state.showDatabasePath);
  }

  function pathToggleIcon(isVisible) {
    return isVisible ? `
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" stroke-width="2"/>
      </svg>
    ` : `
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 3l18 18" stroke-width="2" stroke-linecap="round"/>
        <path d="M10.6 5.2A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-3.1 4.1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.1 6.8A17.1 17.1 0 0 0 2 12s3.5 7 10 7a10.5 10.5 0 0 0 4.3-.9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.9 9.9A3 3 0 0 0 14.1 14.1" stroke-width="2" stroke-linecap="round"/>
      </svg>
    `;
  }

  function uniqueValuesForColumn(key) {
    const rows = state.rows.map((row) => filterValue(row, key));
    return [...new Set(rows)].sort((a, b) => {
      const na = Number(a);
      const nb = Number(b);
      if (Number.isFinite(na) && Number.isFinite(nb)) return na - nb;
      return a.localeCompare(b, "zh-CN");
    });
  }

  function isColumnFiltered(key) {
    const filterState = filterStateFor(key);
    return filterState.selected !== null || Boolean(filterState.expr);
  }

  function renderHeadCell(column) {
    const canSort = column.sortable !== false;
    const canFilter = column.filterable !== false;
    const fixedClass = column.fixedLeft !== undefined ? "fixed-col" : "";
    const fixedStyle = column.fixedLeft !== undefined ? ` style="left:${column.fixedLeft}px"` : "";
    return `
      <th class="${escapeHtml(`${column.className || ""} ${fixedClass}`.trim())}"${fixedStyle}>
        <div class="th-inner">
          ${canSort ? `
            <button class="sort-btn" data-sort-column="${escapeHtml(column.key)}" type="button">
              ${escapeHtml(column.label)}${sortMark(column.key)}
            </button>
          ` : `<span>${escapeHtml(column.label)}</span>`}
          ${canFilter ? `
            <button
              class="filter-btn ${isColumnFiltered(column.key) ? "active" : ""}"
              data-filter-column="${escapeHtml(column.key)}"
              type="button"
              title="筛选"
            >▾</button>
          ` : ""}
        </div>
      </th>
    `;
  }

  function renderRowIndexHeadCell() {
    return '<th class="row-index fixed-col" style="left:0">#</th>';
  }

  function sortMark(key) {
    if (state.productOrderSource !== "details") return "";
    if (state.sortKey !== key) return "";
    return state.sortDir === "asc" ? " ▲" : " ▼";
  }

  function render() {
    const dates = pagedNavDiffDates();
    app.innerHTML = `
      ${renderFilterPanel()}
      ${renderNavDiffSummary()}
      ${renderNavDiffDetail()}
      <div class="table-wrap">
        <table class="detail-table">
          <colgroup>
            <col style="width:44px">
            ${columns.map((column) => `<col style="width:${escapeHtml(column.width || "auto")}">`).join("")}
            ${dates.map(() => '<col style="width:76px">').join("")}
          </colgroup>
          <thead>
            <tr>
              ${renderRowIndexHeadCell()}${columns.map(renderHeadCell).join("")}
              ${dates.map((date) => `
                <th class="nav-diff-inline-head">
                  <button class="nav-diff-sort-btn" type="button" data-nav-diff-sort-date="${escapeHtml(date)}">
                    ${escapeHtml(date)}${state.productOrderSource === "navDiffs" && state.navDiffValueSortDate === date ? (state.navDiffValueSortDir === "asc" ? " ▲" : " ▼") : ""}
                  </button>
                </th>
              `).join("")}
            </tr>
          </thead>
          <tbody>
            ${state.filtered.length
              ? state.filtered.map((row, index) => renderRow(row, index, dates)).join("")
              : `<tr><td colspan="${columns.length + dates.length + 1}" class="empty">没有匹配的数据。</td></tr>`}
          </tbody>
        </table>
      </div>
    `;
    positionFilterPanel();
  }

  function applyNavDiffValueSortToDetails(rows) {
    if (!state.navDiffValueSortDate) return;
    const direction = state.navDiffValueSortDir === "desc" ? -1 : 1;
    rows.sort((left, right) => {
      const leftDiff = navDiffByProductId(left.productId)?.diffs?.[state.navDiffValueSortDate];
      const rightDiff = navDiffByProductId(right.productId)?.diffs?.[state.navDiffValueSortDate];
      return compareValues(numberOrNull(leftDiff), numberOrNull(rightDiff)) * direction;
    });
  }

  function navDiffPageCount() {
    if (!state.navDiffData) return 1;
    return Math.max(1, Math.ceil((state.navDiffData.dates || []).length / state.navDiffPageSize));
  }

  function clampNavDiffPage() {
    state.navDiffPage = Math.min(Math.max(0, state.navDiffPage), navDiffPageCount() - 1);
  }

  function pagedNavDiffDates() {
    if (!state.navDiffData) return [];
    clampNavDiffPage();
    const start = state.navDiffPage * state.navDiffPageSize;
    return (state.navDiffData.dates || []).slice(start, start + state.navDiffPageSize);
  }

  function navDiffClass(value) {
    const parsed = Number(value);
    if (!Number.isFinite(parsed)) return "";
    if (parsed > 100) return "nav-diff-hot-100";
    if (parsed > 50) return "nav-diff-hot-50";
    if (parsed > 30) return "nav-diff-hot-30";
    return navDifClass(value);
  }

  function navDiffByProductId(productId) {
    if (!state.navDiffData) return null;
    return (state.navDiffData.products || []).find((row) => row.productId === productId) || null;
  }

  function renderNavDiffSummary() {
    if (!state.navDiffData) return "";
    const stats = state.navDiffData.stats || {};
    const pageCount = navDiffPageCount();
    const dateRange = state.navDiffData.startDate && state.navDiffData.endDate
      ? `${state.navDiffData.startDate} 至 ${state.navDiffData.endDate}`
      : "-";
    return `
      <div class="nav-diff-summary">
        <div>
          日期范围：${escapeHtml(dateRange)} | 每页 ${state.navDiffPageSize} 个日期
        </div>
        <div class="nav-diff-stats">
          ${renderNavDiffStatButton(">30", stats[">30"])}
          ${renderNavDiffStatButton(">50", stats[">50"])}
          ${renderNavDiffStatButton(">100", stats[">100"])}
        </div>
        <div class="nav-diff-pager">
          <button class="nav-diff-page-btn" type="button" data-nav-diff-page="first" ${state.navDiffPage === 0 ? "disabled" : ""}>最新</button>
          <button class="nav-diff-page-btn" type="button" data-nav-diff-page="prev" ${state.navDiffPage === 0 ? "disabled" : ""}>上一页</button>
          <span>${state.navDiffPage + 1} / ${pageCount}</span>
          <button class="nav-diff-page-btn" type="button" data-nav-diff-page="next" ${state.navDiffPage >= pageCount - 1 ? "disabled" : ""}>下一页</button>
          <button class="nav-diff-page-btn" type="button" data-nav-diff-page="last" ${state.navDiffPage >= pageCount - 1 ? "disabled" : ""}>最早</button>
        </div>
      </div>
    `;
  }

  function renderNavDiffStatButton(threshold, count) {
    const active = state.navDiffDetailThreshold === threshold ? "active" : "";
    return `
      <button class="nav-diff-stat ${active}" type="button" data-nav-diff-threshold="${escapeHtml(threshold)}">
        净值差 ${escapeHtml(threshold)}：${escapeHtml(count || 0)}
      </button>
    `;
  }

  function navDiffExceedances(threshold) {
    if (!state.navDiffData || !threshold) return [];
    const min = Number(String(threshold).replace(">", ""));
    if (!Number.isFinite(min)) return [];
    const items = state.navDiffData.exceedances || [];
    return items.filter((item) => Number(item.navDif) > min).sort((left, right) => {
      const valueDiff = Number(right.navDif) - Number(left.navDif);
      if (valueDiff) return valueDiff;
      return parseDate(right.currentDate) - parseDate(left.currentDate);
    });
  }

  function renderNavDiffDetail() {
    const threshold = state.navDiffDetailThreshold;
    if (!threshold) return "";
    const items = navDiffExceedances(threshold);
    return `
      <div class="nav-diff-detail">
        <div class="nav-diff-detail-head">
          <span>净值差 ${escapeHtml(threshold)} 明细（${items.length} 条）</span>
          <button class="nav-diff-page-btn" type="button" data-nav-diff-detail-close="1">关闭</button>
        </div>
        <div class="nav-diff-detail-body">
          <table class="nav-diff-detail-table">
            <thead>
              <tr>
                <th>productName</th>
                <th style="width:150px">productId</th>
                <th style="width:110px">成立日期</th>
                <th style="width:190px">净值差日期</th>
                <th style="width:90px">当天年化</th>
                <th style="width:90px">净值差</th>
              </tr>
            </thead>
            <tbody>
              ${items.map((item) => `
                <tr>
                  <td class="name">${escapeHtml(item.productName || "-")}</td>
                  <td class="code">${escapeHtml(item.productId || "-")}</td>
                  <td>${escapeHtml(item.establishDate || "-")}</td>
                  <td>${escapeHtml(`${item.previousDate || "-"} -> ${item.currentDate || "-"}`)}</td>
                  <td>${escapeHtml(item.annualizedYield || "-")}</td>
                  <td class="${navDiffClass(item.navDif)}">${escapeHtml(item.navDif || "-")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }

  function renderFilterPanel() {
    const column = columns.find((item) => item.key === state.activeFilterColumn);
    if (!column || column.filterable === false) {
      return '<div class="filter-panel" id="filterPanel" hidden></div>';
    }
    const values = uniqueValuesForColumn(column.key);
    const selected = state.pendingFilterValues || valuesForFilterPanel(column.key);
    const numericExpr = column.numericFilter && parseNumericExpr(state.filterSearch);
    const visibleValues = numericExpr
      ? values
      : values.filter((value) => value.toLowerCase().includes(state.filterSearch.toLowerCase()));
    return `
      <div class="filter-panel" id="filterPanel" data-column="${escapeHtml(column.key)}">
        <div class="filter-panel-head">
          <div class="filter-panel-title">${escapeHtml(column.label)}</div>
          <input class="filter-search" id="filterSearchInput" type="search" value="${escapeHtml(state.filterSearch)}" placeholder="${column.numericFilter ? "搜索值，或输入 >7 / <30" : "搜索值"}">
        </div>
        <div class="filter-actions">
          <button type="button" data-filter-action="select-visible">全选当前</button>
          <button type="button" data-filter-action="clear">清空</button>
        </div>
        <div class="filter-values">
          ${visibleValues.length ? visibleValues.map((value) => `
            <label class="filter-option">
              <input type="checkbox" data-filter-value="${escapeHtml(value)}" ${selected.has(value) ? "checked" : ""}>
              <span title="${escapeHtml(value)}">${escapeHtml(value)}</span>
            </label>
          `).join("") : '<div class="empty" style="border:0;padding:12px;">无匹配值</div>'}
        </div>
        <div class="filter-panel-foot">
          <button type="button" data-filter-action="cancel">取消</button>
          <button type="button" data-filter-action="apply">确定</button>
        </div>
      </div>
    `;
  }

  function positionFilterPanel() {
    const panel = document.getElementById("filterPanel");
    if (!panel || panel.hidden || !state.activeFilterColumn) return;
    const button = document.querySelector(`[data-filter-column="${CSS.escape(state.activeFilterColumn)}"]`);
    if (!button) return;
    const rect = button.getBoundingClientRect();
    const left = Math.min(rect.left, window.innerWidth - 276);
    panel.style.left = `${Math.max(8, left)}px`;
    panel.style.top = `${rect.bottom + 4}px`;
    const input = document.getElementById("filterSearchInput");
    if (input) {
      input.focus();
      const cursor = Math.min(state.filterSearchCaret ?? input.value.length, input.value.length);
      input.setSelectionRange(cursor, cursor);
    }
  }

  function renderRow(row, index, dates = []) {
    const productName = row.productName || row.productId || "-";
    const riskLevel = safe(row.riskLevel);
    const productId = safe(row.productId);
    const establishDate = safe(row.establishDate);
    const productSize = compactAmount(row.productSize);
    const indiAmt = compactAmount(row.indiAmt);
    const navDiffRow = navDiffByProductId(row.productId);
    return `
      <tr>
        <td class="row-index fixed-col" style="left:0">${index + 1}</td>
        <td class="name fixed-col" style="left:44px">
          <div class="product-name-main">
            <span class="product-title">${escapeHtml(productName)}</span>
            ${riskLevel && riskLevel !== "-" ? `<span class="risk-pill">${escapeHtml(riskLevel)}</span>` : ""}
          </div>
          ${productId && productId !== "-" ? `<span class="product-id-sub code">${escapeHtml(productId)}</span>` : ""}
        </td>
        <td class="num nav-dif fixed-col ${navDifClass(row.navDif)}" style="left:304px">
          <span class="nav-dif-value">${escapeHtml(safe(row.navDif))}</span>
          <span class="nav-dif-date">${escapeHtml(safe(row.navDate))}</span>
        </td>
        <td class="fixed-col" style="left:400px">${escapeHtml(safe(row.periodTerm))}</td>
        <td class="num fixed-col" style="left:478px">
          <span class="establish-days-main">${escapeHtml(safe(row.establishDays))}</span>
          ${establishDate && establishDate !== "-" ? `<span class="cell-sub">${escapeHtml(establishDate)}</span>` : ""}
        </td>
        <td class="num fixed-col" style="left:550px">${escapeHtml(safe(row.annualizedYield))}</td>
        <td class="num fixed-col ${amountClassFromValue(row.indiAmtRem)}" style="left:626px">${escapeHtml(compactAmount(row.indiAmtRem))}</td>
        <td class="num fixed-col" style="left:722px">
          <span class="amount-pair">
            <span class="${amountClassFromValue(row.productSize)}">${escapeHtml(productSize)}</span>
            <span class="amount-sep">/</span>
            <span class="${amountClassFromValue(row.indiAmt)}">${escapeHtml(indiAmt)}</span>
          </span>
        </td>
        ${dates.map((date) => {
          const value = navDiffRow?.diffs?.[date] || "";
          return `<td class="nav-diff-cell ${navDiffClass(value)}">${escapeHtml(value || "-")}</td>`;
        }).join("")}
      </tr>
    `;
  }

  function refreshCurrentView() {
    render();
  }

  function updateNoteState(statusText = "") {
    noteToggle.classList.toggle("has-note", Boolean(noteState.content.trim()));
    noteStatus.textContent = statusText || (noteState.content.trim() ? "已保存" : "");
  }

  function clampNotePosition(left, top) {
    const rect = notePopover.getBoundingClientRect();
    const maxLeft = Math.max(8, window.innerWidth - rect.width - 8);
    const maxTop = Math.max(8, window.innerHeight - rect.height - 8);
    return {
      left: Math.min(Math.max(8, left), maxLeft),
      top: Math.min(Math.max(8, top), maxTop),
    };
  }

  function applyNotePosition() {
    if (!Number.isFinite(noteState.left) || !Number.isFinite(noteState.top)) return;
    const position = clampNotePosition(noteState.left, noteState.top);
    noteState.left = position.left;
    noteState.top = position.top;
    notePopover.style.left = `${position.left}px`;
    notePopover.style.top = `${position.top}px`;
    notePopover.style.right = "auto";
  }

  async function loadNote() {
    try {
      const response = await fetch("/db-viewer-note");
      const data = await response.json();
      if (!data.success) throw new Error(data.error || "读取笔记失败");
      noteState.content = data.content || "";
      noteState.left = Number.isFinite(Number(data.left)) ? Number(data.left) : null;
      noteState.top = Number.isFinite(Number(data.top)) ? Number(data.top) : null;
      noteText.value = noteState.content;
      applyNotePosition();
      updateNoteState();
    } catch (error) {
      noteStatus.textContent = "笔记读取失败";
    }
  }

  function openNote() {
    noteText.value = noteState.content;
    notePopover.hidden = false;
    applyNotePosition();
    updateNoteState();
    noteText.focus();
  }

  function closeNote() {
    notePopover.hidden = true;
  }

  async function saveNote(statusText = "已保存") {
    noteState.content = noteText.value;
    try {
      const response = await fetch("/db-viewer-note", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          content: noteState.content,
          left: noteState.left,
          top: noteState.top,
        }),
      });
      const data = await response.json();
      if (!data.success) throw new Error(data.error || "保存笔记失败");
      noteState.content = data.content || "";
      noteState.left = Number.isFinite(Number(data.left)) ? Number(data.left) : noteState.left;
      noteState.top = Number.isFinite(Number(data.top)) ? Number(data.top) : noteState.top;
      updateNoteState(statusText);
    } catch (error) {
      noteStatus.textContent = "保存失败";
    }
  }

  search.addEventListener("input", () => {
    applyFilter();
  });
  reload.addEventListener("click", () => {
    load();
  });
  togglePath.addEventListener("click", () => {
    state.showDatabasePath = !state.showDatabasePath;
    updateMeta();
  });
  noteToggle.addEventListener("click", () => {
    if (notePopover.hidden) {
      openNote();
    } else {
      closeNote();
    }
  });
  noteClose.addEventListener("click", closeNote);
  noteSave.addEventListener("click", () => saveNote());
  noteText.addEventListener("input", () => {
    noteStatus.textContent = "未保存";
  });
  noteText.addEventListener("keydown", (event) => {
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
      event.preventDefault();
      saveNote();
    }
    if (event.key === "Escape") {
      closeNote();
    }
  });
  noteHead.addEventListener("pointerdown", (event) => {
    if (event.target.closest("button")) return;
    notePopover.hidden = false;
    const rect = notePopover.getBoundingClientRect();
    noteState.dragging = true;
    noteState.dragOffsetX = event.clientX - rect.left;
    noteState.dragOffsetY = event.clientY - rect.top;
    notePopover.setPointerCapture(event.pointerId);
  });
  notePopover.addEventListener("pointermove", (event) => {
    if (!noteState.dragging) return;
    const position = clampNotePosition(
      event.clientX - noteState.dragOffsetX,
      event.clientY - noteState.dragOffsetY
    );
    noteState.left = position.left;
    noteState.top = position.top;
    notePopover.style.left = `${position.left}px`;
    notePopover.style.top = `${position.top}px`;
    notePopover.style.right = "auto";
  });
  notePopover.addEventListener("pointerup", (event) => {
    if (!noteState.dragging) return;
    noteState.dragging = false;
    notePopover.releasePointerCapture(event.pointerId);
    saveNote("位置已保存");
  });
  notePopover.addEventListener("pointercancel", () => {
    noteState.dragging = false;
  });
  app.addEventListener("click", (event) => {
    const pageButton = event.target.closest("[data-nav-diff-page]");
    if (pageButton) {
      const wrap = app.querySelector(".table-wrap");
      if (wrap) state.navDiffScrollTop = wrap.scrollTop;
      const action = pageButton.dataset.navDiffPage;
      if (action === "first") state.navDiffPage = 0;
      if (action === "prev") state.navDiffPage -= 1;
      if (action === "next") state.navDiffPage += 1;
      if (action === "last") state.navDiffPage = navDiffPageCount() - 1;
      clampNavDiffPage();
      render();
      updateMeta();
      const nextWrap = app.querySelector(".table-wrap");
      if (nextWrap) nextWrap.scrollTop = state.navDiffScrollTop;
      return;
    }

    const dateSortButton = event.target.closest("[data-nav-diff-sort-date]");
    if (dateSortButton) {
      const date = dateSortButton.dataset.navDiffSortDate;
      if (state.navDiffValueSortDate === date) {
        state.navDiffValueSortDir = state.navDiffValueSortDir === "desc" ? "asc" : "desc";
      } else {
        state.navDiffValueSortDate = date;
        state.navDiffValueSortDir = "asc";
      }
      state.productOrderSource = "navDiffs";
      applyNavDiffValueSortToDetails(state.filtered);
      setProductOrder(state.filtered, "navDiffs");
      render();
      updateMeta();
      return;
    }

    const statButton = event.target.closest("[data-nav-diff-threshold]");
    if (statButton) {
      const threshold = statButton.dataset.navDiffThreshold;
      state.navDiffDetailThreshold = state.navDiffDetailThreshold === threshold ? "" : threshold;
      render();
      return;
    }

    if (event.target.closest("[data-nav-diff-detail-close]")) {
      state.navDiffDetailThreshold = "";
      render();
      return;
    }

    const sortButton = event.target.closest("[data-sort-column]");
    if (sortButton) {
      const column = sortButton.dataset.sortColumn;
      if (columns.find((item) => item.key === column)?.sortable === false) return;
      if (state.sortKey === column) {
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = column;
        state.sortDir = "asc";
      }
      state.productOrderSource = "details";
      applyFilter();
      return;
    }

    const filterButton = event.target.closest("[data-filter-column]");
    if (filterButton) {
      const column = filterButton.dataset.filterColumn;
      if (columns.find((item) => item.key === column)?.filterable === false) return;
      if (state.activeFilterColumn === column) {
        state.activeFilterColumn = "";
        state.pendingFilterValues = null;
        state.filterSearch = "";
        state.filterSearchCaret = 0;
      } else {
        state.activeFilterColumn = column;
        state.pendingFilterValues = initialFilterPanelValues(column);
        const activeColumn = columns.find((item) => item.key === column);
        state.filterSearch = activeColumn?.numericFilter ? filterStateFor(column).expr : "";
        state.filterSearchCaret = 0;
      }
      render();
      return;
    }

    const actionButton = event.target.closest("[data-filter-action]");
    if (actionButton) {
      handleFilterAction(actionButton.dataset.filterAction);
      return;
    }

  });
  app.addEventListener("input", (event) => {
    const searchInput = event.target.closest(".filter-search");
    if (searchInput) {
      if (event.isComposing) return;
      state.filterSearch = searchInput.value;
      state.filterSearchCaret = searchInput.selectionStart ?? searchInput.value.length;
      refreshCurrentView();
      return;
    }
  });
  app.addEventListener("compositionend", (event) => {
    const searchInput = event.target.closest(".filter-search");
    if (!searchInput) return;
    state.filterSearch = searchInput.value;
    state.filterSearchCaret = searchInput.selectionStart ?? searchInput.value.length;
    refreshCurrentView();
  });
  app.addEventListener("change", (event) => {
    const checkbox = event.target.closest("[data-filter-value]");
    if (!checkbox || !state.activeFilterColumn) return;
    const selected = new Set(
      [...app.querySelectorAll("[data-filter-value]:checked")].map((item) => item.dataset.filterValue)
    );
    state.pendingFilterValues = selected;
  });
  document.addEventListener("click", (event) => {
    if (!state.activeFilterColumn) return;
    if (event.target.closest(".filter-panel") || event.target.closest("[data-filter-column]")) return;
    state.activeFilterColumn = "";
    state.filterSearch = "";
    state.filterSearchCaret = 0;
    state.pendingFilterValues = null;
    refreshCurrentView();
  });
  window.addEventListener("resize", () => {
    positionFilterPanel();
    applyNotePosition();
  });

  function handleFilterAction(action) {
    const column = state.activeFilterColumn;
    if (!column) return;
    if (action === "cancel") {
      state.activeFilterColumn = "";
      state.filterSearch = "";
      state.filterSearchCaret = 0;
      state.pendingFilterValues = null;
      refreshCurrentView();
      return;
    }
    if (action === "clear") {
      state.pendingFilterValues = new Set();
      state.filterSearch = "";
      state.filterSearchCaret = 0;
      refreshCurrentView();
      return;
    }
    if (action === "select-visible") {
      const visible = [...app.querySelectorAll("[data-filter-value]")].map((item) => item.dataset.filterValue);
      state.pendingFilterValues = new Set(visible);
      refreshCurrentView();
      return;
    }
    if (action === "apply") {
      const columnConfig = columns.find((item) => item.key === column);
      const filterState = filterStateFor(column);
      if (columnConfig?.numericFilter && parseNumericExpr(state.filterSearch)) {
        filterState.expr = state.filterSearch.trim();
        filterState.selected = null;
        state.activeFilterColumn = "";
        state.filterSearch = "";
        state.filterSearchCaret = 0;
        state.pendingFilterValues = null;
        applyFilter();
        return;
      }
      filterState.expr = "";
      const values = uniqueValuesForColumn(column);
      const selected = state.pendingFilterValues || valuesForFilterPanel(column);
      if (selected && selected.size === values.length) {
        filterState.selected = null;
      } else {
        filterState.selected = new Set(selected);
      }
      state.activeFilterColumn = "";
      state.filterSearch = "";
      state.filterSearchCaret = 0;
      state.pendingFilterValues = null;
      applyFilter();
    }
  }

  loadNote();
  load();
</script>
</body>
</html>
